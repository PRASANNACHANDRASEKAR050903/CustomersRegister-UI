<div class="container mt-5">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <div class="card shadow-lg">

    <div class="card-header bg-primary text-white">
      <h4 class="mb-0">
        Customer Registration
      </h4>
    </div>

    <div class="card-body">

      <form #customerForm="ngForm" (ngSubmit)="saveCustomer(customerForm)">

        <div class="row">

          <!-- First Name -->
          <div class="col-md-6 mb-3">
            <label>First Name</label>
            <input
              type="text"
              name="firstName"
              [(ngModel)]="customer.firstName"
              #firstName="ngModel"
              required
              minlength="3"
              class="form-control">

            <div
              *ngIf="firstName.invalid && (firstName.touched || customerForm.submitted)"
              class="text-danger">
              <small>First Name required (min 3 chars)</small>
            </div>
          </div>

          <!-- Last Name -->
          <div class="col-md-6 mb-3">
            <label>Last Name</label>
            <input
              type="text"
              name="lastName"
              [(ngModel)]="customer.lastName"
              #lastName="ngModel"
              required
              class="form-control">

            <div
              *ngIf="lastName.invalid && (lastName.touched || customerForm.submitted)"
              class="text-danger">
              <small>Last Name required</small>
            </div>
          </div>

          <!-- Email -->
          <div class="col-md-6 mb-3">
            <label>Email</label>
            <input
              type="email"
              name="email"
              [(ngModel)]="customer.email"
              #email="ngModel"
              required
              email
              class="form-control">

            <div
              *ngIf="email.invalid && (email.touched || customerForm.submitted)"
              class="text-danger">
              <small>Enter valid email</small>
            </div>
          </div>

          <!-- Date of Birth -->
          <div class="col-md-6 mb-3">
            <label>Date of Birth</label>
            <input
              type="date"
              name="dateOfBirth"
              [(ngModel)]="customer.dateOfBirth"
              #dob="ngModel"
              required
              class="form-control">

            <div
              *ngIf="dob.invalid && (dob.touched || customerForm.submitted)"
              class="text-danger">
              <small>Date of Birth required</small>
            </div>
          </div>

          <!-- Age -->
          <div class="col-md-6 mb-3">
            <label>Age</label>
            <input
              type="number"
              name="age"
              [(ngModel)]="customer.age"
              readonly
              class="form-control">
          </div>

          <!-- Gender -->
          <div class="col-md-6 mb-3">
            <label>Gender</label>
            <select
              name="gender"
              [(ngModel)]="customer.gender"
              #gender="ngModel"
              required
              class="form-select">

              <option value="">Select Gender</option>
              <option>Male</option>
              <option>Female</option>

            </select>

            <div
              *ngIf="gender.invalid && (gender.touched || customerForm.submitted)"
              class="text-danger">
              <small>Select gender</small>
            </div>
          </div>

        </div>

        <!-- Buttons -->
        <div class="text-end">
          <button
            class="btn btn-success me-2"
            type="submit">
            Save Customer
          </button>

          <button
            class="btn btn-secondary"
            type="reset">
            Cancel
          </button>
        </div>

      </form>

    </div>
  </div>

</div>
